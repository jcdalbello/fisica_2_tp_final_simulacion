<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Ley de Biot-Savart</title>
    <style>
        body { margin: 0; background: #fff; color: #000; font-family: monospace; padding: 20px; }
        h2 { border-bottom: 2px solid #000; padding-bottom: 5px; }
        canvas { background: #f4f4f4; border: 2px solid #000; cursor: crosshair; display: block; margin: 20px 0; }
        .controls { display: flex; gap: 20px; align-items: center; border: 1px solid #ccc; padding: 10px; width: fit-content; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        button { padding: 5px 10px; cursor: pointer; border: 2px solid #000; background: #fff; font-family: monospace; font-weight: bold; }
        button:hover { background: #000; color: #fff; }
        input[type="range"] { cursor: pointer; }
    </style>
</head>
<body>
    <h2>Simulador Ley de Biot-Savart (Vista Transversal 2D)</h2>
    <p>> Trazar cable con el puntero. El campo se evalúa al finalizar el trazo.</p>
    
    <div class="controls">
        <div class="control-group">
            <label>Intensidad (I): <span id="currentValDisplay">50</span></label>
            <input type="range" id="currentSlider" min="1" max="100" value="50">
        </div>
        <div class="control-group">
            <button id="btnInvert">Invertir Sentido (I > 0)</button>
        </div>
        <div class="control-group">
            <button id="btnClear">Limpiar Canvas</button>
        </div>
    </div>

    <canvas id="simCanvas" width="800" height="600"></canvas>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
