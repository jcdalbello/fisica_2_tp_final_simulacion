<!-- index.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Ley de Biot-Savart</title>
    <style>
        body { margin: 0; background: #fff; color: #000; font-family: monospace; padding: 20px; }
        h2 { border-bottom: 2px solid #000; padding-bottom: 5px; }
        .controls { display: flex; gap: 20px; align-items: center; border: 1px solid #ccc; padding: 10px; width: fit-content; margin-bottom: 10px; }
        .control-group { display: flex; flex-direction: column; gap: 5px; }
        button { padding: 5px 10px; cursor: pointer; border: 2px solid #000; background: #fff; font-family: monospace; font-weight: bold; }
        button:hover { background: #000; color: #fff; }
        input[type="range"] { cursor: pointer; }
        
        /* Panel del sensor */
        .probe-panel { border: 2px solid #1976d2; padding: 10px; margin-bottom: 20px; width: fit-content; font-size: 1.1em; background: #f8f9fa; }
        .probe-value { font-weight: bold; color: #d32f2f; }
        
        /* Sistema de capas para el Canvas */
        .canvas-container { position: relative; width: 800px; height: 600px; border: 2px solid #000; background: #f4f4f4; cursor: crosshair; }
        .canvas-layer { position: absolute; top: 0; left: 0; }
        #overlayCanvas { pointer-events: none; /* Deja pasar los clics al canvas de abajo */ }
    </style>
</head>
<body>
    <h2>Simulador Ley de Biot-Savart (Vista Transversal 2D)</h2>
    <p>> Trazar cable con el puntero. El campo se evalúa al finalizar el trazo.</p>
    
    <div class="controls">
        <div class="control-group">
            <label>Intensidad (I): <span id="currentValDisplay">50</span></label>
            <input type="range" id="currentSlider" min="1" max="100" value="50">
        </div>
        <div class="control-group">
            <button id="btnInvert">Invertir Sentido (I > 0)</button>
        </div>
        <div class="control-group">
            <button id="btnClear">Limpiar Canvas</button>
        </div>
    </div>

    <!-- Interfaz del sensor -->
    <div class="probe-panel">
        Sensor de Campo Magnético (Bz): <span id="probeValue" class="probe-value">0.00</span>
    </div>

    <!-- Contenedor con dos canvas superpuestos -->
    <div class="canvas-container">
        <canvas id="simCanvas" class="canvas-layer" width="800" height="600"></canvas>
        <canvas id="overlayCanvas" class="canvas-layer" width="800" height="600"></canvas>
    </div>

    <script type="module" src="./src/main.ts"></script>
</body>
</html>
